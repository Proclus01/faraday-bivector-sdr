devices:
  - id: hms
    adapter: soapy
    args: "driver=hermes"
    rx_channels:
      - channel: 0
        center_freq_hz: 144000000.0
        sample_rate_hz: 192000.0
        bandwidth_hz: 192000.0
        gain_db: 20
        block_size: 4096

projections:
  - id: p0
    device: hms
    channel: 0

pipelines:
  - id: spectrum
    input: p0
    ops:
      - spectrum: {fft_size: 4096, avg: 8}

outputs:
  - type: spectrum_console
    pipeline: spectrum
    frames: 8
    topk: 3
